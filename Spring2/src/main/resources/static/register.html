<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<title>Brad Big Company</title>
	</head>
	<body>
		<form id="regForm">
			Account: <input id="account" /><span id="mesg"></span><br />
			Password: <input type="password" id="passwd" /><br />
			<input type="submit" value="Register" /><br />
			<span id="result"></span>
		</form>
		<script type="text/javascript">
			let account = document.getElementById("account");
			let passwd = document.getElementById("passwd");
			let mesg = document.getElementById("mesg");
			let result = document.getElementById("result");
			let regForm = document.getElementById("regForm");
			
			account.addEventListener('blur', async ()=>{
				console.log(account.value);
				let url = "/api/members/exist?account=" + account.value;
				let res = await fetch(url);
				console.log(res);
				let isExist = await res.json();
				console.log(isExist);
				mesg.textContent = isExist?"Account EXIST":"";
			});
			regForm.addEventListener('submit', async (e) => {
				e.preventDefault();
				
				let data = {
					account: account.value,
					passwd: passwd.value
				};
				
				console.log(JSON.stringify(data));
				
				let url = "/api/members/register";
				let res = await fetch(url, {
					method: 'POST',
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify(data)
				});
				
				let json = await res.json();
				console.log(json);
				
				if(json.success){
					location.href ="login.html";
				}else{
					result.textContent = "Register Failure"
				}
				
				
			});
		
		
		
		
		
		
		</script>
	
	</body>
</html>
