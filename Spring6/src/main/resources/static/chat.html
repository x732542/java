<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Insert title here</title>
		<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
	</head>
	<body>
		<h1>Chat Room</h1>
		<hr />
		<div>
			Account: <input id="account" /><br />
			Password: <input id="passwd" type="password" /><br />
			<button id="login">Login</button>
		</div>
		<p>登入狀態: <span id="status">未登入</span></p>
		<hr />
		<div id="chatDiv" style="display:none">
			<div id="chatBox" 
				style="border:1px solid #ccc; width:880px; height:300px; overflow-y:scroll;"></div>
			<input id="mesg" style="width:800px" />
			<button id="send">Send</button>
		</div>
		
	</body>
	<script type="text/javascript">
		let token = null;	//
		let client = null;
		
		document.getElementById("login").onclick = async () => {
			let account = document.getElementById("account").value;
			let passwd = document.getElementById("passwd").value;
			
			let resp = await fetch("/auth/login", {
				method: "POST",
				headers: {"Content-Type":"application/json"},
				body: JSON.stringify({
					"account": account,
					"passwd" : passwd
				})
			});
			
			console.log(resp.ok);
			if (resp.ok){
				let data = await resp.json();
				console.log(data);
				token = data.token;
				document.getElementById("status").innerHTML = "已登入(" + data.name + ")";
				document.getElementById("chatDiv").style.display = "block";
				
				connectWebSocket();
			}
		}
		
		document.getElementById("send").onclick = async () => {
			let mesg = document.getElementById("mesg").value.trim();
			client.send('/app/chat/send', {}, mesg);
			document.getElementById("mesg").value = '';
		}
	
		function connectWebSocket(){
			let socket = new SockJS('/ws-chat?token=' + encodeURIComponent('Bearer ' + token));
			client = Stomp.over(socket);
			client.connect({}, function(frame){
				console.log(frame);
				
				client.subscribe("/topic/public", function(message){
					console.log(message);
					let body = JSON.parse(message.body);
					console.log(body);
					receiveMesg(body);
				});
				
				
			});
		}
		
		function receiveMesg(mesg){
			let box = document.getElementById("chatBox");
			let line = document.createElement("div");
			line.innerHTML = `[${mesg.time} ${mesg.account}] : ${mesg.content}`;
			box.appendChild(line);
		}
	
	
	</script>
	
	
	
	
</html>
